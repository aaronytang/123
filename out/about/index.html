:root {

p strong { color: var(--black); font-weight: 600; }

.label {
  font-size: 11px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--light);
}

/* underline link */
.ul { text-decoration: underline; text-underline-offset: 4px; text-decoration-thickness: 1px; text-decoration-color: var(--light); transition: text-decoration-color .25s; }
.ul:hover { text-decoration-color: var(--black); }

/* ---------- reveal ---------- */
.rv { opacity: 0; transform: translateY(14px); transition: opacity .7s ease, transform .7s ease; }

@media (prefers-reduced-motion: reduce) { .rv { opacity: 1; transform: none; transition: none; } }

/* ---------- header bar ---------- */
.bar {
  position: sticky; top: 0; z-index: 60;
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 18px var(--pad);
  background: rgba(255,255,255,.9); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--line);

}

.bar .links { display: flex; gap: 24px; }

/* ---------- home intro ---------- */
.intro { padding: clamp(48px, 9vh, 110px) var(--pad) clamp(40px, 7vh, 80px); }
.intro h1 {
  font-size: clamp(22px, 2.6vw, 34px); font-weight: 500; max-width: 760px; line-height: 1.3;
}

/* ---------- project index (flat images) ---------- */
.index { margin: 0 var(--pad); border-top: 1px solid var(--black); }
.index-label { padding: 12px 0 0; }

.entry { display: block; padding: clamp(32px, 5vh, 56px) 0; border-bottom: 1px solid var(--line); }

  padding-top: 0;
  padding-bottom: 0;
}
.entry .shot {

  aspect-ratio: 16 / 8.5; overflow: hidden;
  display: flex; align-items: center; justify-content: center; padding: 4% 6%;
}
.entry .shot img { width: 100%; height: 100%; object-fit: contain; transition: transform .6s cubic-bezier(.2,.6,.2,1); }
.entry:hover .shot img { transform: scale(1.015); }

  display: grid; grid-template-columns: 64px 1fr 320px 90px; gap: 24px; align-items: baseline;
  padding-top: 20px;
}

  grid-template-columns: 1fr 320px 90px;
}

.entry .name .tag { font-size: 13px; font-weight: 500; letter-spacing: 0; color: var(--light); margin-left: 14px; white-space: nowrap; }
.entry .fact { font-size: 13.5px; color: var(--grey); line-height: 1.45; }
.entry .ar { text-align: right; font-size: 18px; color: var(--light); transition: color .3s, transform .3s; }

}

  justify-content: flex-end;
  gap: 18px;
  z-index: 2;
  pointer-events: none;
}
.entry-featured .shot-top {
  display: grid;
  grid-template-columns: 1fr 32px;
  align-items: start;
  gap: 14px;
  max-width: min(44%, 360px);
}
.entry-featured .shot-tag {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.entry-featured .shot-tag { color: var(--grey); }
.entry-featured .shot-ar {
  justify-self: end;
  font-size: 18px;
  color: var(--light);
  transition: color .3s, transform .3s;
}
.entry-featured .shot-bottom {
  max-width: min(44%, 360px);
}
.entry-featured .shot-name {
  display: block;
  font-size: clamp(28px, 4.2vw, 50px);
  font-weight: 500;
  letter-spacing: -0.03em;
  line-height: 0.96;
  color: var(--black);
}
.entry-featured .shot-fact {
  display: block;
  margin-top: 14px;
  font-size: 13.5px;
  line-height: 1.5;
  color: var(--grey);
}
.entry-featured:hover .shot-ar {
  color: var(--black);
  transform: translateX(4px);
}

/* smaller grid for selected work */
.mini-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; padding: 24px 0; border-bottom: 1px solid var(--line); }
.mini { display: block; }
.mini .shot {
  background: #f6f6f5;
  aspect-ratio: 4 / 3; overflow: hidden;
  display: flex; align-items: center; justify-content: center; padding: 8%;
}
.mini .shot img { width: 100%; height: 100%; object-fit: contain; transition: transform .6s cubic-bezier(.2,.6,.2,1); }
.mini:hover .shot img { transform: scale(1.02); }
.mini .meta { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; padding-top: 14px; }
.mini .name { font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
.mini .fact { font-size: 12.5px; color: var(--grey); margin-top: 2px; }
.mini .no { font-size: 12px; color: var(--light); font-variant-numeric: tabular-nums; }

@media (max-width: 860px) {

  .entry .fact { grid-column: 2; }
  .entry .meta.meta-no-number .fact { grid-column: 1; }
  .entry .ar { display: none; }
  .entry-featured .shot {

  }
  .entry-featured .shot-ar {
    display: none;
  }
  .entry-featured .shot-bottom {
    max-width: min(72%, 300px);
  }
  .mini-grid { grid-template-columns: 1fr; gap: 40px; }
}

@media (max-width: 640px) {

    min-height: 300px;
    padding: 8% 8%;
  }

  .entry-featured .shot-top {

  }
  .entry-featured .shot-tag {

    font-size: clamp(22px, 9vw, 34px);
  }
  .entry-featured .shot-fact {
    font-size: 12.5px;
  }

/* ---------- home footer note / capabilities ---------- */
.caps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; padding: clamp(48px, 8vh, 96px) var(--pad); }
.caps .c .label { display: block; margin-bottom: 12px; }

footer { border-top: 1px solid var(--black); padding: clamp(40px, 7vh, 80px) var(--pad) 32px; }

   ============================================================ */
.case-top { padding: clamp(44px, 8vh, 96px) var(--pad) 0; }
.case-top .label { display: block; margin-bottom: 20px; }

.outcomes .label { display: block; margin-bottom: 0; padding-bottom: 12px; }
.out-grid { display: grid; grid-template-columns: repeat(3, 1fr); border-top: 1px solid var(--black); }

.sec .label { display: block; margin-bottom: 16px; }

.sec p { max-width: 680px; }
